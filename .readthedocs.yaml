version: 2

build:
  os: ubuntu-24.04
  apt_packages:
    - jq
    - xvfb
    - libgl1
    - libegl1
    - libxkbcommon-x11-0
    - libxcb-cursor0
  tools:
    python: "3.13"
  jobs:
    pre_create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
    build:
      html:
        - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" uv run --frozen docs/images/home/generate.py
        - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" QT_QPA_PLATFORM="xcb" PYOPENGL_PLATFORM="glx" LIBGL_ALWAYS_SOFTWARE="1" xvfb-run -a uv run --frozen docs/images/gui/generate.py
        - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" QT_QPA_PLATFORM="xcb" PYOPENGL_PLATFORM="glx" LIBGL_ALWAYS_SOFTWARE="1" xvfb-run -a uv run --frozen docs/images/qc/generate.py
        - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" QT_QPA_PLATFORM="xcb" PYOPENGL_PLATFORM="glx" LIBGL_ALWAYS_SOFTWARE="1" xvfb-run -a uv run --frozen docs/images/visualization/generate.py
        - |
          if [ "$READTHEDOCS_VERSION_TYPE" = external ]; then
            CONFUSIUS_BINDER_REF=$(curl -fsSL "https://api.github.com/repos/confusius-tools/confusius/pulls/$READTHEDOCS_GIT_IDENTIFIER" | jq -r .head.ref)
          else
            CONFUSIUS_BINDER_REF="$READTHEDOCS_GIT_IDENTIFIER"
          fi
          UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" CONFUSIUS_BINDER_REF="$CONFUSIUS_BINDER_REF" QT_QPA_PLATFORM="xcb" PYOPENGL_PLATFORM="glx" LIBGL_ALWAYS_SOFTWARE="1" xvfb-run -a uv run --frozen python tools/build_gallery.py
        - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" uv run --frozen zensical build --strict
    post_build:
      - mkdir -p $READTHEDOCS_OUTPUT/html/
      - cp --recursive site/* $READTHEDOCS_OUTPUT/html/
