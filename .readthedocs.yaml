version: 2

build:
  os: ubuntu-24.04
  apt_packages:
    - xvfb
    - libgl1
    - libegl1
    - libxkbcommon-x11-0
    - libxcb-cursor0
  tools:
    python: "3.13"
  jobs:
    pre_create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
    build:
      html:
        - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" QT_QPA_PLATFORM="xcb" PYOPENGL_PLATFORM="glx" LIBGL_ALWAYS_SOFTWARE="1" xvfb-run -a uv run --frozen docs/images/gui/generate.py
        - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" QT_QPA_PLATFORM="xcb" PYOPENGL_PLATFORM="glx" LIBGL_ALWAYS_SOFTWARE="1" xvfb-run -a uv run --frozen docs/images/qc/generate.py
        - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" QT_QPA_PLATFORM="xcb" PYOPENGL_PLATFORM="glx" LIBGL_ALWAYS_SOFTWARE="1" xvfb-run -a uv run --frozen docs/images/visualization/generate.py
        - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" uv run --frozen zensical build
    post_build:
      - mkdir -p $READTHEDOCS_OUTPUT/html/
      - cp --recursive site/* $READTHEDOCS_OUTPUT/html/
